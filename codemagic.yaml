# Codemagic CI/CD Configuration
# For automated iOS build

workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      node: "18"
      xcode: "latest"
      cocoapods: "default"
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: "main"
          include: true
        - pattern: "develop"
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Install EAS CLI
        script: |
          npm install -g eas-cli
      - name: Configure EAS Build
        script: |
          eas build:configure --platform ios --non-interactive
        environment:
          eas:
            # Add your EAS token to Codemagic environment variables
            # Name: EAS_TOKEN
            token: ${EAS_TOKEN}
      - name: Build iOS
        script: |
          eas build --platform ios --profile preview --non-interactive
        environment:
          eas:
            token: ${EAS_TOKEN}
    artifacts:
      - build/**/*.ipa
      - build/**/*.dSYM
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  ios-production:
    name: iOS Production Build
    max_build_duration: 60
    environment:
      node: "18"
      xcode: "latest"
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build iOS Production
        script: |
          eas build --platform ios --profile production --non-interactive
    artifacts:
      - build/**/*.ipa